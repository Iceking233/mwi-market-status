name: Sync Official Market History

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-official-market-history
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync official market archive
        env:
          MWI_OFFICIAL_MARKET_URL: ${{ vars.MWI_OFFICIAL_MARKET_URL }}
        run: node bakcend/sync-official-market-history.mjs

      - name: Commit archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/history/official docs/market
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "chore: sync official market history"
          git push
